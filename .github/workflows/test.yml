name: Test Go Action

on: [push, pull_request]

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Ejecutar mi Action en Go
        id: saludo # Le ponemos un ID para poder referenciar sus outputs
        # Al usar './', GitHub construirá el Dockerfile que está en la raíz
        uses: ./ 
        with:
          who_to_greet: 'Desarrollador Go'

      - name: Imprimir el output
        run: echo "La acción se ejecutó a las ${{ steps.saludo.outputs.time }}"